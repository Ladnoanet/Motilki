<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мотыльки</title>
    <style>
        body {
            height: 50vh;
            background: linear-gradient(to bottom, #fff4e2 0%, rgba(255, 244, 226, 0) 70%);
            background-size: 100% 90%;
            background-repeat: no-repeat;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        h2 {
            font-size: 24px;
        }

        img {
            width: 100%;
        }

        div.pojertvovania {
            width: 95%;
            background-color: #fff4e2;
            margin: auto;
            margin-top: 10px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px;
        }

        .pojertvovania a {
            display: inline-block;
            text-decoration: none;
            color: black;
            background-color: white;
            height: 37px;
            width: 37px;
            text-align: center;
            line-height: 37px;
            font-size: larger;
            border-radius: 50%;
        }

        h3 {
            margin: auto;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #fef8ed;
            margin: 0;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        footer a {
            margin: 0 10px;
        }

        footer svg {
            height: 36px;
            width: 36px;
            background-color: #fef8ed;
            fill: #999999;
            transition: fill 0.3s;
        }

        footer a:hover svg {
            fill: #ff914d;
        }

        .fees {
            width: 100%;
            background-color: #ffe5d5;
            margin: auto;
            margin-top: 10px;
            border-radius: 25px;
        }

        .fees img {
            margin-top: 0;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            width: 100%;
        }

        .fees a {
            display: inline-block;
            text-decoration: none;
            color: black;
            background-color: rgb(255, 242, 232);
            height: 37px;
            width: 95%;
            text-align: center;
            line-height: 37px;
            font-size: larger;
            border-radius: 25px;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .account {
            width: 75vw; 
            height: 75vw;
            background-color: #ff914d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
        }

        .account svg {
            display: block;
        }

        button, .menat {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            display: inline-block;
            text-decoration: none;
            color: black;
            background-color: rgb(255, 242, 232);
            height: 37px;
            width: 100%;
            text-align: center;
            line-height: 37px;
            font-size: larger;
            border-radius: 25px;
            margin-top: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <center>
        <h1>Error 76</h1>
        <h2>К сожалению вы не на мобильном устройстве</h2>
    </center>
</body>
</html>
